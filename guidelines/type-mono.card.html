<!-- @dsCard group="Type" viewport="700x210" name="Mono · IBM Plex Mono" subtitle="Verbatim letter text & extracted structured fields only" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--surface-card); font-family: var(--font-sans); color: var(--text-primary); }
  .fields { display: grid; grid-template-columns: auto 1fr; gap: 6px 18px; max-width: 460px; }
  .k { font-size: 12px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--text-muted); align-self: center; }
  .v { font-family: var(--font-mono); font-size: 15px; color: var(--text-primary); }
  .note { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 16px; }
</style>
</head>
<body>
  <div class="fields">
    <span class="k">Date</span><span class="v">Tue 12 Jun 2026 · 10:30</span>
    <span class="k">NHS no.</span><span class="v">485 777 3456</span>
    <span class="k">Phone</span><span class="v">020 7188 7188</span>
  </div>
  <div class="note">extracted fields render as machine-read data</div>
</body>
</html>
