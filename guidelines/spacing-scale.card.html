<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="4px base grid, used generously" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .item { text-align: center; }
  .bar { background: var(--brand); border-radius: 3px; width: 100%; }
  .t { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 8px; }
  .n { font-size: 12px; font-weight: 600; color: var(--text-primary); }
</style>
</head>
<body>
  <div class="row">
    <div class="item" style="width:28px"><div class="bar" style="height:4px"></div><div class="n">1</div><div class="t">4</div></div>
    <div class="item" style="width:28px"><div class="bar" style="height:8px"></div><div class="n">2</div><div class="t">8</div></div>
    <div class="item" style="width:32px"><div class="bar" style="height:12px"></div><div class="n">3</div><div class="t">12</div></div>
    <div class="item" style="width:36px"><div class="bar" style="height:16px"></div><div class="n">4</div><div class="t">16</div></div>
    <div class="item" style="width:40px"><div class="bar" style="height:24px"></div><div class="n">6</div><div class="t">24</div></div>
    <div class="item" style="width:48px"><div class="bar" style="height:32px"></div><div class="n">8</div><div class="t">32</div></div>
    <div class="item" style="width:56px"><div class="bar" style="height:48px"></div><div class="n">12</div><div class="t">48</div></div>
    <div class="item" style="width:64px"><div class="bar" style="height:64px"></div><div class="n">16</div><div class="t">64</div></div>
  </div>
</body>
</html>
