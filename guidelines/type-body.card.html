<!-- @dsCard group="Type" viewport="700x250" name="Body & labels · Lexend" subtitle="17px default, 1.65 line-height for comfortable reading" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--surface-card); font-family: var(--font-sans); color: var(--text-primary); }
  .eyebrow { font-size: var(--text-2xs); font-weight: 600; letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--text-muted); margin: 0 0 10px; }
  .body { font: var(--type-body); max-width: 560px; margin: 0 0 12px; }
  .small { font: var(--type-body-sm); color: var(--text-secondary); margin: 0; }
  .spec { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <p class="eyebrow">What to bring &nbsp;<span class="spec">caption 12 · tracked uppercase</span></p>
  <p class="body">You have a skin (dermatology) appointment on Tuesday 12 June at 10:30am. Bring your medication list and arrive 15 minutes early. <span class="spec">— body 17/1.65</span></p>
  <p class="small">Always check this against your original letter. — body-sm 15/1.5</p>
</body>
</html>
