<!-- @dsCard group="Brand" viewport="700x300" name="Voice · letter → Medifi" subtitle="The core transformation: formal admin into a plain-English plan" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); font-family: var(--font-sans); display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 18px; }
  .letter { background: var(--paper-0); border: 1px solid var(--border-default); border-radius: var(--radius-sm); padding: 16px; font-family: var(--font-mono); font-size: 12px; line-height: 1.6; color: var(--ink-600); }
  .arrow { color: var(--accent); font-size: 26px; font-weight: 700; }
  .plan { background: var(--paper-0); border: 1px solid var(--border-default); border-left: 4px solid var(--brand); border-radius: var(--radius-md); padding: 16px 18px; box-shadow: var(--shadow-sm); }
  .eyebrow { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); margin: 0 0 6px; }
  .plan h4 { font: var(--type-title); margin: 0 0 6px; color: var(--text-primary); }
  .plan p { font-size: 14px; line-height: 1.55; color: var(--text-secondary); margin: 0; }
</style>
</head>
<body>
  <div class="letter">Dear Patient,<br><br>You are invited to attend the Dermatology Outpatient Department. Failure to attend may result in discharge back to your GP.</div>
  <div class="arrow">→</div>
  <div class="plan">
    <p class="eyebrow">Your plan</p>
    <h4>Skin appointment — Tue 12 Jun, 10:30am</h4>
    <p>St Thomas' Hospital, Clinic B. If you can't go, call the number below so you don't lose your place.</p>
  </div>
</body>
</html>
