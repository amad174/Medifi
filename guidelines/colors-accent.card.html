<!-- @dsCard group="Colors" viewport="700x170" name="Accent · Lens Teal" subtitle="Clarity, focus, secondary highlight" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border-subtle); }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; }
  .name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .star { box-shadow: inset 0 0 0 2px var(--accent); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--teal-50)"></div><div class="meta"><div class="name">50</div><div class="hex">#e8f8f5</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--teal-100)"></div><div class="meta"><div class="name">100</div><div class="hex">#cdeeea</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--teal-500)"></div><div class="meta"><div class="name">500</div><div class="hex">#14a89e</div></div></div>
    <div class="sw star"><div class="chip" style="background:var(--teal-600)"></div><div class="meta"><div class="name">600 · accent</div><div class="hex">#0e8c84</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--teal-700)"></div><div class="meta"><div class="name">700</div><div class="hex">#0a6f68</div></div></div>
  </div>
</body>
</html>
