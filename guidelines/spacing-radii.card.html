<!-- @dsCard group="Spacing" viewport="700x180" name="Corner radii" subtitle="Rounded, never sharp or bubbly" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; gap: 18px; align-items: flex-end; }
  .item { text-align: center; }
  .box { width: 80px; height: 64px; background: var(--brand-subtle); border: 1.5px solid var(--brand-border); }
  .n { font-size: 12px; font-weight: 600; color: var(--text-primary); margin-top: 8px; }
  .t { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="n">xs</div><div class="t">6px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="n">sm</div><div class="t">10px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="n">md</div><div class="t">14px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="n">lg</div><div class="t">20px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="n">xl</div><div class="t">28px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-pill);width:64px"></div><div class="n">pill</div><div class="t">999px</div></div>
  </div>
</body>
</html>
