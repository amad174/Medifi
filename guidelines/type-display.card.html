<!-- @dsCard group="Type" viewport="700x250" name="Display & headings · Lexend" subtitle="Bold, tight tracking — sentence case" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--surface-card); font-family: var(--font-sans); color: var(--text-primary); }
  .item { display: flex; align-items: baseline; gap: 16px; padding: 7px 0; border-bottom: 1px solid var(--border-subtle); }
  .item:last-child { border-bottom: 0; }
  .spec { flex: 0 0 92px; font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
  .d { font: var(--type-display); letter-spacing: var(--tracking-tight); }
  .h1 { font: var(--type-h1); }
  .h2 { font: var(--type-h2); }
  .h3 { font: var(--type-h3); }
</style>
</head>
<body>
  <div class="item"><span class="spec">display · 48/700</span><span class="d">Clear next steps</span></div>
  <div class="item"><span class="spec">h1 · 38/700</span><span class="h1">Your action plan</span></div>
  <div class="item"><span class="spec">h2 · 30/600</span><span class="h2">What you need to do</span></div>
  <div class="item"><span class="spec">h3 · 24/600</span><span class="h3">Before your appointment</span></div>
</body>
</html>
